<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR跳高训练模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Microsoft YaHei', sans-serif;
            background: #000;
            color: #fff;
        }
        #app {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        #renderCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="renderCanvas"></canvas>
        <div id="uiRoot"></div>
    </div>
</body>
</html>
